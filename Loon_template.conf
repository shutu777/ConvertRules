[Host]
# SSID DNS设置（控制DNS解析层）
# ================================
# 语法格式：ssid:WiFi名 = server:DNS服务器IP
#
# 作用：连接指定WiFi时，将DNS请求发往指定的DNS服务器
# 与 [Proxy Group] 的 SSID策略组 配合使用：
#   - 节点选择(ssid类型)：控制代理路由层 → 决定流量走代理还是直连
#   - 本节(Host SSID)：控制DNS解析层 → 防止Loon的DNS与OpenWrt DNS冲突
#
# 为什么需要？
#   当Loon开启时，DNS默认走 [General] 中配置的公共DNS(如223.5.5.5)
#   但如果OpenWrt旁路由有自己的DNS分流(如mosdns/smartdns)，公共DNS会绕过OP的DNS规则
#   设置 SSID DNS 后，该WiFi下DNS请求发往OpenWrt，由OP统一处理DNS分流
#
# DNS服务器IP填什么？
#   - 普通家庭(主路由翻墙)：填主路由/网关IP（如192.168.5.1）
#   - 旁路由方案(OP做分流)：填OpenWrt旁路由IP（如192.168.5.2）
#   关键：谁负责代理分流，DNS就指向谁，确保DNS解析和代理路由一致
#
# 使用方法：将WiFi名和DNS服务器IP替换为你的实际值
# ================================
# 当前配置：DNS指向主路由(192.168.5.1)，主路由转发给OP处理DNS分流
ssid:TP-LINK_5G1_FC52 = server:192.168.5.1

