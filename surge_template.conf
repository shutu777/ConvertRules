[MITM]
# 启用 MITM
enable = true
# 证书配置（请使用 base64 编码的 p12 证书替换下面的占位符）
ca-p12 = YOUR_BASE64_ENCODED_CERTIFICATE_HERE
# 跳过的主机名（不解密）
skip-server-cert-verify = *.apple.com, *.icloud.com, *.cdn-apple.com
# 需要解密的域名（可根据需要添加）
hostname = %APPEND% *.google.com, *.youtube.com, *.facebook.com, *.twitter.com