#udp_whitelist=1-442, 444-65535
# > WiFi/蜂窝网络代理模式自动切换（running_mode_trigger）
# ================================
# 语法格式：
#   running_mode_trigger=蜂窝模式, 默认WiFi模式, WiFi名1:模式, WiFi名2:模式
#
# 可用模式：
#   filter      → 规则分流（按分流规则决定直连/代理，推荐日常使用）
#   all_proxy   → 全局代理（所有流量走代理节点）
#   all_direct  → 全局直连（所有流量直连，适用于路由器已翻墙的WiFi）
#
# ⚠️ 重要：all_direct模式下，重写(Rewrite)/脚本(Script)依然生效！
#   流量处理顺序：App请求 → QuanX拦截 → MitM解密 → 重写去广告 → 路由(all_direct)
#   所以设为all_direct后，去广告功能正常工作，只是代理路由交给路由器处理
#
# 使用场景：
#   场景1: 家中OpenWrt/路由器已翻墙 → WiFi设all_direct（路由器分流+QuanX去广告）
#   场景2: 蜂窝数据(4G/5G)  → filter（使用分流规则，按需代理）
#   场景3: 未知WiFi(默认)    → filter（使用分流规则，保护隐私）
#   场景4: 公司WiFi(需代理)  → filter（使用分流规则）
#   场景5: 公共WiFi(不安全)  → all_proxy（全局代理保护隐私）
#
# 使用方法：
#   1. 删除下方示例行前面的 "#" 注释符号
#   2. 将 "YourHomeWiFi_5G" 等替换为你的实际WiFi名称（区分大小写）
#   3. WiFi名称可在 手机设置→WiFi 中查看，必须完全匹配
#   4. 可添加多个WiFi，用逗号分隔：WiFi名:模式
#
# 示例（取消注释并修改WiFi名称后生效）：
running_mode_trigger=filter, filter, YourHomeWiFi_5G:all_direct, YourHomeWiFi_2.4G:all_direct, OfficeWiFi:filter
# ================================
# > dns_exclusion_list
dns_exclusion_list=*.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn
# > udp_drop_list 可直接屏蔽 STUN、QUIC 等协议的数据包
udp_drop_list = 443, STUN, QUIC


