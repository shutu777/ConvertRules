  - select:
      name: Telegram
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Telegram.png
      policies: [节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, 香港故转, 自动选择, 全部节点, DIRECT]
  - select:
      name: Netflix
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Netflix.png
      policies: [节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, 香港故转, 自动选择, 全部节点, DIRECT]
  - select:
      name: Speedtest
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Speedtest.png
      policies: [节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, 香港故转, 自动选择, 全部节点, DIRECT]
  - select:
      name: PayPal
      icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/PayPal.png
      policies: [节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, 香港故转, 自动选择, 全部节点, DIRECT]
  - select:
      name: Apple
      icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png
      policies: [节点选择, 香港节点, 台湾节点, 日本节点, 狮城节点, 美国节点, 香港故转, 自动选择, 全部节点, DIRECT]

  # 地区节点（请替换为你的订阅 URL）
  - external:
      name: 香港节点
      type: select
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/HK.png
      urls:
        - "YOUR_SUBSCRIPTION_URL_HERE"
      filter: "^(?=.*((?i)🇭🇰|香港|(\\b(HK|HKG|Hong)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
      update_interval: 86400
      interval: 600
      tolerance: 100
      timeout: 5
  - external:
      name: 台湾节点
      type: select
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/TW.png
      urls:
        - "YOUR_SUBSCRIPTION_URL_HERE"
      filter: "^(?=.*((?i)🇹🇼|台湾|(\\b(TW|TWN|Tai|Taiwan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
      update_interval: 86400
      interval: 600
      tolerance: 100
      timeout: 5
  - external:
      name: 日本节点
      type: select
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/JP.png
      urls:
        - "YOUR_SUBSCRIPTION_URL_HERE"
      filter: "^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\\b(JP|JPN|Japan)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
      update_interval: 86400
      interval: 600
      tolerance: 100
      timeout: 5
  - external:
      name: 狮城节点
      type: select
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/SG.png
      urls:
        - "YOUR_SUBSCRIPTION_URL_HERE"
      filter: "^(?=.*((?i)🇸🇬|新加坡|狮|(\\b(SG|SGP|Singapore)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
      update_interval: 86400
      interval: 600
      tolerance: 100
      timeout: 5
  - external:
      name: 美国节点
      type: select
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/US.png
      urls:
        - "YOUR_SUBSCRIPTION_URL_HERE"
      filter: "^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\\b(US|USA|United States)(\\d+)?\\b)))(?!.*((?i)回国|校园|游戏|🎮|(\\b(GAME)\\b))).*$"
      update_interval: 86400
      interval: 600
      tolerance: 100
      timeout: 5

  # 功能策略组
  - fallback:
      name: 香港故转
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/HK.png
      policies:
        - 香港节点
        - 香港自动
        - 自动选择
      interval: 300
      timeout: 5
  - auto_test:
      name: 香港自动
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/HK.png
      policies:
        - 香港节点
      interval: 300
      tolerance: 50
      timeout: 5
  - auto_test:
      name: 自动选择
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Auto.png
      policies:
        - 香港节点
        - 台湾节点
        - 日本节点
        - 狮城节点
        - 美国节点
        - 全部节点
      interval: 300
      tolerance: 50
      timeout: 5
  - conditional:
      name: 网络切换
      icon: network
      rules:
        - ssid:
            match: "YOUR_WIFI_SSID"
            policy: DIRECT
        - cellular:
            match: "*"
            policy: 节点选择
      default_policy: 节点选择

  # 全部节点
  - external:
      name: 全部节点
      type: select
      icon: https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png
      urls:
        - "YOUR_SUBSCRIPTION_URL_HERE"
      filter: "^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联)).*$"
      update_interval: 86400
      interval: 600
      tolerance: 100
      timeout: 5

  # 兜底策略组
